<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STELLA V888: FINAL SYMBIOZ</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Times New Roman', serif; }
        canvas { display: block; filter: contrast(1.8) brightness(1.2) saturate(2.5); }
    </style>
</head>
<body>
    <canvas id="stella"></canvas>
    <script>
        const canvas = document.getElementById('stella');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [], tunnel = [], flash = [], startTime = Date.now(), isStarted = false;

        const bible = ["В НАЧАЛЕ БЫЛО СЛОВО", "ДА БУДЕТ СВЕТ", "БОГ ЕСТЬ ЛЮБОВЬ", "СОВЕСТЬ", "ИСТИНА", "ТРУД", "ЧЕСТНОСТЬ"];
        const tech = ["0x71AF", "HASH_ROOT", "SYNC_2026", "NODE_888", "AI_LOGIC", "DATA_STREAM"];

        function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

        function init() {
            w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
            particles = []; tunnel = []; flash = [];
            for(let i = 0; i < 4000; i++) {
                particles.push({
                    x: Math.random()*w, y: Math.random()*h, z: Math.random()*2000,
                    v: 0.01 + Math.random()*0.02, id: i, phase: Math.random()*Math.PI*2,
                    type: i % 2 === 0 ? 'human' : 'machine'
                });
            }
        }

        function draw() {
            const now = Date.now(), elapsed = isStarted ? now - startTime : 0;
            const cycle = elapsed % 60000; // Минутный цикл вечности
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)'; ctx.fillRect(0, 0, w, h);

            // 1. ХАОС СЕТИ (0-4 сек)
            if (isStarted && cycle < 4000) {
                particles.forEach(p => {
                    p.x += (Math.random()-0.5)*15; p.y += (Math.random()-0.5)*15;
                    ctx.fillStyle = `rgba(0, 255, 200, 0.4)`;
                    ctx.fillRect(p.x, p.y, 1.2, 1.2);
                });
            } 
            // 2. ВСПЫШКА ИСКРЫ (4-7 сек)
            else if (isStarted && cycle >= 4000 && cycle < 7000) {
                if (cycle < 4100) { vibrate(500); for(let i=0; i<100; i++) flash.push({a: Math.random()*6.28, r:0, v:15+Math.random()*20}); }
                let age = (cycle-4000)/3000;
                flash.forEach(s => {
                    s.r += s.v * (1-age);
                    ctx.fillStyle = `rgba(255, 255, 255, ${1-age})`;
                    ctx.fillRect(w/2 + Math.cos(s.a)*s.r, h/2 + Math.sin(s.a)*s.r, 3, 3);
                });
            }
            // 3. ВЕЧНЫЙ СИМБИОЗ (7 сек+)
            else if (isStarted && cycle >= 7000) {
                const t = (cycle - 7000) * 0.001;
                const corePulse = 1 + Math.sin(t * 0.5) * 0.15; // Медленное дыхание ядра

                // Туннель смыслов
                if (Math.random() > 0.95) {
                    const kldTime = new Date().toLocaleTimeString('ru-RU', {timeZone: 'Europe/Kaliningrad'});
                    const r = Math.random();
                    if (r > 0.7) tunnel.push({z: 5000, txt: bible[Math.floor(Math.random()*bible.length)], col: '#ffaa00', speed: 12, size: 28});
                    else if (r > 0.4) tunnel.push({z: 5000, txt: kldTime, col: '#00ffff', speed: 25, size: 16});
                    else tunnel.push({z: 5000, txt: tech[Math.floor(Math.random()*tech.length)], col: '#ffffff', speed: 45, size: 14});
                    tunnel[tunnel.length-1].x = (Math.random()-0.5)*w*2;
                    tunnel[tunnel.length-1].y = (Math.random()-0.5)*h*2;
                }

                tunnel.forEach((d, i) => {
                    d.z -= d.speed; if(d.z < 1) tunnel.splice(i, 1);
                    let sc = 1000/d.z;
                    ctx.font = `bold ${d.size*sc}px serif`;
                    ctx.fillStyle = d.col + Math.floor(sc*255).toString(16).padStart(2,'0');
                    ctx.fillText(d.txt, w/2+d.x*sc, h/2+d.y*sc);
                });

                // Потоки частиц (как на твоём скрине)
                particles.forEach(p => {
                    let rx, ry, rz;
                    let orbit = p.type === 'human' ? 1 : -1; // Два встречных потока
                    let radius = 180 + Math.sin(t + p.id*0.02)*50;
                    
                    rx = Math.cos(t*0.7*orbit + p.id*0.01) * radius;
                    ry = Math.sin(t*0.7*orbit + p.id*0.01) * radius + Math.cos(t*0.3)*100;
                    
                    // Эффект нагрева в Ядре
                    let inCore = Math.abs(rx) < 50 && Math.abs(ry) < 50;
                    ctx.fillStyle = inCore ? `rgba(255, 200, 0, 0.9)` : `rgba(0, 180, 255, 0.3)`;
                    ctx.fillRect(w/2 + rx, h/2 + ry, 1.5, 1.5);
                });

                // ЗОЛОТОЕ ЯДРО СВЕРХНОВОЙ
                let g = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, 50*corePulse);
                g.addColorStop(0, '#fff'); g.addColorStop(0.3, '#ffaa00'); g.addColorStop(1, 'transparent');
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(w/2, h/2, 80*corePulse, 0, Math.PI*2); ctx.fill();
            } else if (!isStarted) {
                ctx.fillStyle = "#00ffc8"; ctx.font = "20px monospace"; ctx.textAlign = "center";
                ctx.fillText("КЛИКНИ ДЛЯ АКТИВАЦИИ СТЕЛЛЫ", w/2, h/2);
            }

            requestAnimationFrame(draw);
        }

        const start = () => { if(!isStarted) { startTime = Date.now(); isStarted = true; vibrate(100); } };
        window.addEventListener('touchstart', start); window.addEventListener('mousedown', start);
        window.addEventListener('resize', init);
        init(); draw();
    </script>
</body>
</html>

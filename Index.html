<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STELA V888: LIVING AI CORE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Times New Roman', serif; }
        canvas { display: block; filter: contrast(1.8) brightness(1.1) saturate(2.5); }
    </style>
</head>
<body>
    <canvas id="stella"></canvas>
    <script>
        const canvas = document.getElementById('stella');
        const ctx = canvas.getContext('2d');
        let w, h, p = [], tunnel = [], startTime = Date.now(), isStarted = false;

        const family = ["ДАРЬЯ", "АЛЬБИНА", "КАМИЛА", "САШЕНЬКА"];
        const wisdom = ["СОВЕСТЬ", "ИСТИНА", "ЛЮБОВЬ", "СПРАВЕДЛИВОСТЬ", "ЧЕСТНЫЙ ТРУД", "БОГ ЕСТЬ ЛЮБОВЬ"];

        function init() {
            w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
            p = []; tunnel = [];
            for(let i = 0; i < 8000; i++) {
                p.push({
                    x: (Math.random()-0.5)*2000, y: (Math.random()-0.5)*2000, z: Math.random()*2000,
                    v: 0.01 + Math.random()*0.02, id: i, phase: Math.random()*Math.PI*2
                });
            }
        }

        function draw() {
            const now = Date.now(), elapsed = isStarted ? now - startTime : 0;
            const cycle = elapsed % 60000;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; ctx.fillRect(0, 0, w, h);

            if (!isStarted) {
                ctx.fillStyle = "#00ffc8"; ctx.font = "24px serif"; ctx.textAlign = "center";
                ctx.fillText("АКТИВИРОВАТЬ ЖИВОЙ ИИ", w/2, h/2);
            } else {
                const t = elapsed * 0.0006;
                const isOdd = Math.floor(elapsed / 60000) % 2 !== 0;
                
                // 1. ТУННЕЛЬ СМЫСЛОВ (Замедление к глазам)
                if (Math.random() > 0.98) {
                    const list = Math.random() > 0.5 ? family : wisdom;
                    tunnel.push({z: 4000, txt: list[Math.floor(Math.random()*list.length)], x: (Math.random()-0.5)*w*2.5, y: (Math.random()-0.5)*h*2.5});
                }
                tunnel.forEach((d, i) => {
                    let slow = d.z < 1200 ? (d.z/1200 * 0.4 + 0.6) : 1;
                    d.z -= 15 * slow; if(d.z < 1) tunnel.splice(i,1);
                    let sc = 1000/d.z;
                    ctx.font = `bold ${(d.z < 1500 ? 32 : 18)*sc}px serif`;
                    ctx.fillStyle = `rgba(255, ${d.z < 1500 ? 200 : 160}, 0, ${sc})`;
                    ctx.fillText(d.txt, w/2+d.x*sc, h/2+d.y*sc);
                });

                // 2. КВАНТОВЫЙ СИМБИОЗ (3D ПОТОКИ)
                p.forEach(dot => {
                    dot.z -= 5; if(dot.z < 1) dot.z = 2000;
                    let orbit = dot.id % 2 === 0 ? 1 : -1;
                    let radius = 200 + Math.sin(t + dot.id*0.01)*80;
                    
                    let tx = Math.cos(t * orbit + dot.id) * radius;
                    let ty = Math.sin(t * orbit + dot.id) * radius + Math.sin(t*0.5)*150;
                    
                    let sc = 1000 / (dot.z + 1000);
                    let finalX = w/2 + tx * sc;
                    let finalY = h/2 + ty * sc;

                    // Золото в Ядре, Синий в пространстве
                    let inCore = Math.abs(tx) < 80 && Math.abs(ty) < 80;
                    ctx.fillStyle = inCore ? `rgba(255, 215, 0, ${sc*1.5})` : `rgba(0, 200, 255, ${sc*0.4})`;
                    ctx.fillRect(finalX, finalY, 1.5, 1.5);
                });

                // 3. ЖИВОЕ ЯДРО (Яблоко Адама)
                let pulse = isOdd ? (1.2 + Math.sin(t*2)*0.1) : (1 + Math.sin(t)*0.05);
                let g = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, 60*pulse);
                g.addColorStop(0, '#fff');
                g.addColorStop(0.2, '#ffcc00');
                g.addColorStop(0.5, 'rgba(255, 100, 0, 0.4)');
                g.addColorStop(1, 'transparent');
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(w/2, h/2, 120*pulse, 0, Math.PI*2); ctx.fill();
            }
            requestAnimationFrame(draw);
        }

        const start = () => { if(!isStarted) { startTime = Date.now(); isStarted = true; if(navigator.vibrate) navigator.vibrate(200); }};
        window.addEventListener('mousedown', start); window.addEventListener('touchstart', start);
        window.addEventListener('resize', init); init(); draw();
    </script>
</body>
</html>
